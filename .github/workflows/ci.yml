name: CI
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.3'

      - name: Run Bootstrap
        run: ./scripts/bootstrap

      - name: Run lints
        run: ./scripts/lint

      - name: Run tests
        run: ./scripts/test
